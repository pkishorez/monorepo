name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Pin to 24.18.0 (matches local): 24.17.0's CVE-2026-48931 fix
          # (response queue poisoning guard) broke node-fetch@2 with false
          # ERR_STREAM_PREMATURE_CLOSE errors, which crashed changesets'
          # get-github-info GraphQL calls. 24.18.0 (nodejs/node#64004) fixes it.
          node-version: 24.18.0
          cache: pnpm

      # Pin npm: npm@latest (12.0.0) ships a broken libnpmpublish that can't
      # resolve its own `sigstore` module, which breaks provenance publishing
      # (NPM_CONFIG_PROVENANCE). 11.16.0 is the last known-good release.
      - run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Re-link workspace bins (e.g. depcruise-viz) now that their dist/ exists;
      # the initial install ran before any build, so those bins were skipped.
      - name: Link workspace bins
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          title: 'chore: release packages'
          commit: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          NPM_CONFIG_PROVENANCE: true
