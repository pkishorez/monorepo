name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin to 24.18.0 (matches local): 24.17.0's CVE-2026-48931 fix
          # (response queue poisoning guard) broke node-fetch@2 with false
          # ERR_STREAM_PREMATURE_CLOSE errors, which crashed changesets'
          # get-github-info GraphQL calls. 24.18.0 (nodejs/node#64004) fixes it.
          node-version: 24.18.0
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # monoverse builds via Bun and is intentionally kept out of the generic
      # `pnpm build` (which consumers run) so it doesn't force Bun on them.
      - name: Build monoverse
        run: pnpm --filter monoverse run build:ondemand

      # Re-link workspace bins (e.g. depcruise-viz) now that their dist/ exists;
      # the initial install ran before any build, so those bins were skipped.
      - name: Link workspace bins
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          title: 'chore: release packages'
          commit: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          NPM_CONFIG_PROVENANCE: true
