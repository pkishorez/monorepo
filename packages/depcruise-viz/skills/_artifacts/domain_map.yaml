library:
  name: 'depcruise-viz'
  version: '0.0.8'
  repository: 'pkishorez/monorepo'
  description: "Author a project's layered architecture as a typed config — a layer graph (DAG of layers) plus declared modules — compile it to dependency-cruiser rules, and enforce layer ordering and module rules."
  primary_framework: 'framework-agnostic'

domains:
  - name: 'Authoring the architecture model'
    slug: 'authoring-model'
    description: 'Reasoning about and declaring the architecture: layers, the layer graph (edges/siblings), and modules (opaque, rules) in depcruise.config.ts.'
  - name: 'Enforcing boundaries'
    slug: 'enforcement'
    description: 'Running the analysis (deps / files / lint), reading its output, and wiring lint into CI and package scripts.'
  - name: 'Programmatic integration'
    slug: 'programmatic-integration'
    description: 'Embedding the cruise/analyze surface (cruiseProject, analyzeDeps, analyzeFiles, pure helpers) in tooling instead of the CLI.'

skills:
  - name: 'Author the architecture config'
    slug: 'author-architecture-config'
    domain: 'authoring-model'
    description: 'Write depcruise.config.ts using the DSL — layers, a layer graph of edges (siblings independent, reachability transitive), and modules with opaque/rules — at the right granularity.'
    type: 'core'
    covers:
      - 'layer()'
      - 'layerGraph()'
      - 'edge() (single + array fan-out)'
      - 'module()'
      - 'ProjectConfig shape (rootDir, ignore, rules, modules)'
      - 'ModuleRules (root / leaf / onlyImports / onlyImportedBy)'
      - 'Layer / Layer graph / Edge / Sibling / Module / Opaque module vocabulary'
    tasks:
      - 'Band files into layers and draw the sparsest allowed-import graph'
      - 'Model a diamond with siblings sharing a lower layer'
      - 'Declare modules and mark wiring points opaque'
      - 'Attach module rules where architectural intent is clear'
      - 'Decide layer and module granularity'
    failure_modes:
      - mistake: 'Using retired functions or options (layersTopDown / group / feature / visibility / sharedWith / barrel)'
        mechanism: 'The DSL now exports only edge / layer / layerGraph / module. The old stack/group/feature/visibility model was retired; those symbols and options no longer exist, so the config fails to load.'
        wrong_pattern: |
          import { layersTopDown, feature, group } from 'depcruise-viz'; // not exported
          module('src/cli', { barrel: true });                          // renamed
          module('src/util', { visibility: 'public', sharedWith: [...] });// removed
        correct_pattern: |
          import { edge, layer, layerGraph, module } from 'depcruise-viz';
          layerGraph('app', [edge(cli, core), edge(core, types)]);
          module('src/cli', { opaque: true });
        source: 'src/authoring/index.ts; src/types.ts'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Reusing a layer name'
        mechanism: 'Layer identity is the name; reusing a name merges the paths into a single spanning node instead of two distinct layers.'
        wrong_pattern: |
          layer('internal', ['src/a']);
          layer('internal', ['src/b']); // merge into one layer
        correct_pattern: |
          layer('a-internal', ['src/a']);
          layer('b-internal', ['src/b']);
        source: 'src/authoring/layer.ts; CONTEXT.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Self-edge or redundant skip edge'
        mechanism: 'edge(a, a) throws (self-edge). Because reachability is transitive, edge(a, c) is redundant when edge(a, b) + edge(b, c) already exist, and layerGraph rejects duplicate edges.'
        wrong_pattern: |
          edge(core, core); // throws
          layerGraph('app', [edge(cli, core), edge(core, types), edge(cli, types)]); // skip edge redundant
        correct_pattern: |
          layerGraph('app', [edge(cli, core), edge(core, types)]);
        source: 'src/authoring/layer-graph.ts'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Module-rule contradiction'
        mechanism: 'root is sugar for onlyImportedBy: [] and leaf for onlyImports: []; combining root with onlyImportedBy (or leaf with onlyImports) throws at load.'
        wrong_pattern: |
          module('src/types.ts', { rules: { root: true, onlyImportedBy: ['src/cli'] } }); // throws
        correct_pattern: |
          module('src/types.ts', { rules: { leaf: true } });
        source: 'src/authoring/module.ts (validateRules)'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Coarse module that mixes concerns'
        mechanism: 'A module should map to a self-contained unit. Declaring a parent directory that bundles unrelated concerns (or over-nesting trivially) defeats boundary checks; aim for the granularity that is actually self-contained.'
        wrong_pattern: |
          module('src', {}); // whole tree as one module
        correct_pattern: |
          module('src/authoring');
          module('src/compile');
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Enforce boundaries'
    slug: 'enforce-boundaries'
    domain: 'enforcement'
    description: 'Run deps / files / lint, wire lint into CI/package scripts, and interpret coverage, layer violations, module overlaps, and module-rule breaches.'
    type: 'lifecycle'
    covers:
      - 'depcruise-viz lint (the gate)'
      - 'depcruise-viz files [--all] (coverage inventory)'
      - 'depcruise-viz deps <path> (boundary analysis + suggested rules)'
      - 'lint:depcruise package script pattern'
      - 'exit-code semantics (violations fail; warnings do not)'
      - 'coverage reporting (orphaned files, module gaps, overlapping-layer conflicts)'
      - 'the three violation classes (layer violation / module overlap / module-rule breach)'
    tasks:
      - 'Add a lint:depcruise script and run it in CI'
      - 'Analyze a folder with deps before authoring modules/rules'
      - 'Read and act on the three violation classes'
      - 'Drive orphaned + module-gap files to zero with files'
      - 'Diagnose overlapping layer patterns and ordering cycles'
    failure_modes:
      - mistake: 'Treating uncovered files as harmless'
        mechanism: 'Coverage gaps print as yellow warnings and never fail lint, so a green lint can still hide unmodeled files; the goal is zero uncovered files.'
        wrong_pattern: |
          # lint exits 0 with "12 file(s) not covered by any module" -> assumed fine
        correct_pattern: |
          # cross-check with `depcruise-viz files`; add layers/modules until orphaned + module-gap are empty
        source: 'src/cli/run.ts (reportCoverage); maintainer interview; README Gotchas'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Confusing the three violation classes'
        mechanism: 'Layer violations (an import with no allowing path), module overlaps (nested module declarations), and module-rule breaches (a cross-module import breaking a declared rule) have different fixes.'
        wrong_pattern: |
          # "fix" a module-rule breach by reordering layers (wrong lever)
        correct_pattern: |
          # layer violation -> reverse the import; overlap -> un-nest modules; rule breach -> fix import or revisit rule
        source: 'src/cli/run.ts; src/types.ts (LayerViolation, ModuleOverlap, ModuleViolation)'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Overlapping layer path patterns'
        mechanism: "When two layers' paths overlap, a file matches both and is silently attributed to the first-declared layer; reported only as a warning."
        wrong_pattern: |
          layer('core', ['src']);      // matches everything, including src/cli
          layer('cli', ['src/cli']);
        correct_pattern: |
          layer('core', ['src/authoring', 'src/compile']);
          layer('cli', ['src/cli']);
        source: 'src/cli/run.ts; src/types.ts (LayerConflict); README Gotchas'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Layer-ordering cycle across graphs'
        mechanism: 'Edges from all layer graphs are merged; a layer name reused with opposite ordering forms a cycle and validation throws ("Layer ordering cycle detected") before cruising.'
        wrong_pattern: |
          layerGraph('a', [edge(x, y)]); // x -> y
          layerGraph('b', [edge(y, x)]); // y -> x  => cycle
        correct_pattern: |
          # keep a single consistent direction for any shared layer name
        source: 'src/compile/validate-layer-ordering.ts'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Using glob patterns in ignore'
        mechanism: 'ignore entries are literal path prefixes, not globs; a glob like **/__tests__/** matches nothing and silently leaves files uncovered.'
        wrong_pattern: |
          ignore: ['**/__tests__/**']; // matches nothing
        correct_pattern: |
          ignore: ['src/foo/__tests__', 'src/routeTree.gen.ts'];
        source: 'src/cli/load-config.ts; README Gotchas'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Programmatic analysis'
    slug: 'programmatic-analysis'
    domain: 'programmatic-integration'
    description: 'Use cruiseProject / analyzeDeps / analyzeFiles and the pure compile/analyze helpers to build tooling (e.g. a graph/DevTools view) instead of the CLI.'
    type: 'core'
    covers:
      - 'depcruise-viz/node: cruiseProject, analyzeDeps, analyzeFiles'
      - 'root helpers: toDependencyCruiserConfig, toVisualizationConfig, summarizeCruiseResult'
      - 'DepcruiseVizData / VizSummary / VisualizationConfig / DepsAnalysis / FilesAnalysis shapes'
    tasks:
      - 'Cruise a package and read summary.violations / moduleViolations / moduleOverlaps'
      - 'Build deps/files views programmatically with analyzeDeps / analyzeFiles'
      - 'Render a visualization config'
      - 'Compose the pure helpers in custom tooling'
    failure_modes:
      - mistake: 'Importing cruiseProject / analyzeDeps / analyzeFiles from the root entry'
        mechanism: 'Anything that runs a cruise is exported only from depcruise-viz/node; the root entry exports the pure DSL and compile/analyze helpers, not the cruiser.'
        wrong_pattern: |
          import { cruiseProject, analyzeDeps } from 'depcruise-viz'; // not exported
        correct_pattern: |
          import { cruiseProject, analyzeDeps, analyzeFiles } from 'depcruise-viz/node';
        source: 'src/index.ts; src/node.ts'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Reading summary.breaches (or calling detectCrossGroupEdges)'
        mechanism: 'The visibility/breach and group model was retired. VizSummary exposes violations, moduleOverlaps, and moduleViolations; there is no breaches field and no group helpers.'
        wrong_pattern: |
          result.summary.breaches;      // undefined
          detectCrossGroupEdges(...);   // no longer exported
        correct_pattern: |
          result.summary.violations;      // layer-graph violations
          result.summary.moduleViolations;// module-rule breaches
          result.summary.moduleOverlaps;  // nested-module overlaps
        source: 'src/types.ts (VizSummary); src/index.ts'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Pointing cruiseProject at the wrong directory'
        mechanism: 'cruiseProject (like the CLI) loads depcruise.config.ts from the directory passed and resolves rootDir/tsconfig relative to it — not the process cwd.'
        wrong_pattern: |
          cruiseProject(process.cwd()); // run from repo root, config lives in the package
        correct_pattern: |
          cruiseProject(packageDirContainingConfig);
        source: 'src/cruise/index.ts; src/cli/load-config.ts; README Gotchas'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Generating against the wrong version surface'
        mechanism: 'There are no maintained doc files; package.json (version + exports) is the source of truth, refreshed each release. Agents trained on other versions hallucinate exports or option shapes.'
        wrong_pattern: |
          # call an export or option that does not exist in the installed version
        correct_pattern: |
          # check the installed package.json version and exports before generating
        source: 'maintainer interview; package.json'
        priority: 'HIGH'
        status: 'active'
        skills:
          [
            'author-architecture-config',
            'enforce-boundaries',
            'programmatic-analysis',
          ]

tensions:
  - name: 'Granularity vs maintenance overhead'
    skills: ['author-architecture-config', 'enforce-boundaries']
    description: 'Fine-grained, self-contained modules and a precise layer graph give sharper boundaries but more config to keep in sync.'
    implication: 'An agent over-coarsens to one big module (weak enforcement) or over-nests trivially (noisy config) instead of the self-contained unit that makes sense.'
  - name: 'Zero-uncovered goal vs incremental adoption'
    skills: ['author-architecture-config', 'enforce-boundaries']
    description: 'Targeting zero uncovered files conflicts with dropping the tool into a large existing codebase gradually.'
    implication: 'An agent either declares lint "passing" while files stay unmodeled, or tries to model everything at once and stalls.'
  - name: 'Internal programmatic surface vs version drift'
    skills: ['programmatic-analysis', 'author-architecture-config']
    description: 'The programmatic API is powerful but evolves per release with package.json as the only source of truth.'
    implication: 'An agent assumes a stable documented API and generates against exports/options that do not exist in the installed version.'

cross_references:
