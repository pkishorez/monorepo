library:
  name: 'depcruise-viz'
  version: '0.0.1'
  repository: 'pkishorez/monorepo'
  description: "Author a project's layered architecture as a typed config, compile it to dependency-cruiser rules, and enforce layer ordering and module-visibility boundaries."
  primary_framework: 'framework-agnostic'

domains:
  - name: 'Authoring the architecture model'
    slug: 'authoring-model'
    description: 'Reasoning about and declaring the architecture: stacks, groups, layers, features, and module visibility in depcruise.config.ts.'
  - name: 'Enforcing boundaries'
    slug: 'enforcement'
    description: 'Running the analysis, reading its output, and wiring lint into CI and package scripts.'
  - name: 'Programmatic integration'
    slug: 'programmatic-integration'
    description: 'Embedding the compile/cruise/analyze surface in tooling instead of the CLI.'

skills:
  - name: 'Author the architecture config'
    slug: 'author-architecture-config'
    domain: 'authoring-model'
    description: 'Write depcruise.config.ts using the DSL — layers, top-down stacks, groups, features, and module visibility — with the right granularity.'
    type: 'core'
    covers:
      - 'layer()'
      - 'layersTopDown()'
      - 'group()'
      - 'feature()'
      - 'module()'
      - 'ProjectConfig shape (rootDir, ignore, rules, modules, features)'
      - 'Stack / Group / Layer / Shared layer / Feature / Module / Breach vocabulary'
      - 'visibility resolution (private | shared | public)'
    tasks:
      - 'Describe a top-down layering and forbid upward imports'
      - 'Isolate sub-projects with groups and a public surface'
      - 'Attach modules to features and pick the right visibility'
      - 'Decide feature and module granularity'
    failure_modes:
      - mistake: 'Stack built with fewer than two layers'
        mechanism: 'layersTopDown throws when given <2 layers — a single-layer ordering has nothing to order.'
        wrong_pattern: |
          layersTopDown('app', [core]) // throws: must have at least 2 layers
        correct_pattern: |
          layersTopDown('app', [cli, core, types])
        source: 'src/authoring/layers-top-down.ts; README Gotchas'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Reusing a layer name within the same group'
        mechanism: 'Layer identity is (group, name); the same name across stacks in one group merges into a single shared layer instead of staying distinct.'
        wrong_pattern: |
          ...group('db', [
            layersTopDown('sqlite', [layer('internal', ['src/db/sqlite'])]),
            layersTopDown('dynamo', [layer('internal', ['src/db/dynamo'])]),
          ]) // both 'internal' merge into one layer
        correct_pattern: |
          layer('sqlite/internal', ['src/db/sqlite'])
          layer('dynamo/internal', ['src/db/dynamo'])
        source: 'src/types.ts (Layer identity); README Gotchas; CONTEXT.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'sharedWith with a non-shared visibility'
        mechanism: 'module() forces visibility to "shared" when sharedWith is passed, and throws if an explicit conflicting visibility is also set; "shared" without a non-empty sharedWith also throws.'
        wrong_pattern: |
          module('src/util', { feature: 'authoring', visibility: 'public', sharedWith: ['compile'] }) // throws
        correct_pattern: |
          module('src/util', { feature: 'authoring', sharedWith: ['compile', 'analyze'] })
        source: 'src/authoring/module.ts'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Feature modeled as a code folder, not a user journey'
        mechanism: 'A feature is an end-to-end journey from the user perspective (a frontend route, or a backend API-request path), not a directory; same feature spanning tiers needs a naming convention.'
        wrong_pattern: |
          feature('utils')            // a folder, not a journey
          feature('checkout')         // ambiguous across tiers
        correct_pattern: |
          feature('checkout:frontend') // the route journey
          feature('checkout:backend')  // the API-request path
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
        skills: ['author-architecture-config']
      - mistake: 'Coarse module that mixes concerns'
        mechanism: 'A module should map to a self-contained unit. Declaring a parent directory that bundles unrelated concerns (or over-nesting trivially) defeats boundary checks; aim for the granularity that is actually self-contained.'
        wrong_pattern: |
          module('src', { feature: 'app' }) // whole tree as one module
        correct_pattern: |
          module('src/authoring', { feature: 'authoring' })
          module('src/compile', { feature: 'compile' })
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Enforce boundaries in CI'
    slug: 'enforce-boundaries'
    domain: 'enforcement'
    description: 'Run depcruise-viz lint, wire it into CI/package scripts, and interpret violations, breaches, coverage warnings, and exit codes.'
    type: 'lifecycle'
    covers:
      - 'depcruise-viz lint command'
      - 'lint:depcruise package script pattern'
      - 'exit-code semantics (violations + breaches fail; warnings do not)'
      - 'coverage reporting (uncovered files, module gaps, overlapping-layer conflicts)'
      - 'violations vs breaches distinction'
    tasks:
      - 'Add a lint:depcruise script and run it in CI'
      - 'Read and act on layer violations vs boundary breaches'
      - 'Drive uncovered files to zero'
      - 'Diagnose overlapping layer patterns'
    failure_modes:
      - mistake: 'Treating uncovered files as harmless'
        mechanism: 'Coverage gaps print as yellow warnings and never fail lint, so a green lint can still hide unmodeled files; the goal is zero uncovered files.'
        wrong_pattern: |
          # lint exits 0 with "12 file(s) not covered by any module" -> assumed fine
        correct_pattern: |
          # add layers/modules until "0 file(s) not covered"; treat warnings as a to-do
        source: 'src/cli/run.ts (reportCoverage); maintainer interview; README Gotchas'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Overlapping layer path patterns'
        mechanism: "When two layers' paths overlap, a file matches both and is silently attributed to the first-declared layer; reported only as a warning."
        wrong_pattern: |
          layer('core', ['src'])
          layer('cli', ['src/cli']) // src/cli also matches 'core'
        correct_pattern: |
          layer('core', ['src/authoring', 'src/compile'])
          layer('cli', ['src/cli'])
        source: 'src/cli/run.ts; src/types.ts (LayerConflict); README Gotchas'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Layer-ordering cycle across stacks'
        mechanism: 'Edges from all stacks are merged; a layer name reused with opposite ordering forms a cycle and validation throws before cruising.'
        wrong_pattern: |
          layersTopDown('a', [x, y]) // x -> y
          layersTopDown('b', [y, x]) // y -> x  => cycle x -> y -> x
        correct_pattern: |
          # keep a single consistent ordering for any shared layer name
        source: 'src/compile/validate-layer-ordering.ts'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Confusing violations with breaches'
        mechanism: 'Violations are layer-ordering breaks (upward imports); breaches are visibility crossings into private/non-shared internals — different fixes.'
        wrong_pattern: |
          # "fix" a breach by reordering layers (wrong lever)
        correct_pattern: |
          # violation -> fix import direction; breach -> import the public/shared surface
        source: 'src/cli/run.ts; src/types.ts (LayerViolation, Breach)'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Programmatic analysis'
    slug: 'programmatic-analysis'
    domain: 'programmatic-integration'
    description: 'Use cruiseProject and the pure compile/analyze helpers to build tooling (e.g. a graph/DevTools view) instead of the CLI.'
    type: 'core'
    covers:
      - 'depcruise-viz/node: cruiseProject'
      - 'root helpers: toDependencyCruiserConfig, toVisualizationConfig, summarizeCruiseResult, detectCrossGroupEdges, assertGroupIsolation'
      - 'DepcruiseVizResult / VizSummary / VisualizationConfig shapes'
    tasks:
      - 'Cruise a package and read summary.violations / summary.breaches'
      - 'Render a visualization config'
      - 'Compose the pure helpers in custom tooling'
    failure_modes:
      - mistake: 'Importing cruiseProject from the root entry'
        mechanism: 'cruiseProject is only exported from depcruise-viz/node; the root entry exports the pure DSL and compile/analyze helpers, not the cruiser.'
        wrong_pattern: |
          import { cruiseProject } from 'depcruise-viz' // not exported
        correct_pattern: |
          import { cruiseProject } from 'depcruise-viz/node'
        source: 'src/index.ts; src/node.ts'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Pointing cruiseProject at the wrong directory'
        mechanism: 'cruiseProject (like the CLI) loads depcruise.config.ts from the directory passed and resolves rootDir/tsconfig relative to it — not the process cwd.'
        wrong_pattern: |
          cruiseProject(process.cwd()) // run from repo root, config lives in the package
        correct_pattern: |
          cruiseProject(packageDirContainingConfig)
        source: 'src/cruise/index.ts; src/cli/load-config.ts; README Gotchas'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Generating against the wrong version surface'
        mechanism: 'There are no maintained doc files; package.json (version + exports) is the source of truth, refreshed each release. Agents trained on other versions hallucinate exports or option shapes.'
        wrong_pattern: |
          # call an export or option that does not exist in the installed version
        correct_pattern: |
          # check the installed package.json version and exports before generating
        source: 'maintainer interview; package.json'
        priority: 'HIGH'
        status: 'active'
        skills:
          [
            'author-architecture-config',
            'enforce-boundaries',
            'programmatic-analysis',
          ]

tensions:
  - name: 'Granularity vs maintenance overhead'
    skills: ['author-architecture-config', 'enforce-boundaries']
    description: 'Fine-grained, self-contained modules and journey-shaped features give sharper boundaries but more config to keep in sync.'
    implication: 'An agent over-coarsens to one big module (weak enforcement) or over-nests trivially (noisy config) instead of the self-contained unit that makes sense.'
  - name: 'Zero-uncovered goal vs incremental adoption'
    skills: ['author-architecture-config', 'enforce-boundaries']
    description: 'Targeting zero uncovered files conflicts with dropping the tool into a large existing codebase gradually.'
    implication: 'An agent either declares lint "passing" while files stay unmodeled, or tries to model everything at once and stalls.'
  - name: 'Internal programmatic surface vs version drift'
    skills: ['programmatic-analysis', 'author-architecture-config']
    description: 'The programmatic API is powerful but evolves per release with package.json as the only source of truth.'
    implication: 'An agent assumes a stable documented API and generates against exports/options that do not exist in the installed version.'

cross_references:
