packages:
  - apps/*
  - devtools/*
  - packages/*
  - std-toolkit

# Hold new releases for 24 hours (in minutes) so compromised versions have time to be reported.
minimumReleaseAge: 1440

peerDependencyRules:
  allowedVersions:
    # Upstream's peer range lags behind its working Vite version.
    '@content-collections/vite>vite': '8'
    # bun-ffi-structs works with the workspace's TypeScript 7 toolchain.
    'bun-ffi-structs>typescript': '7'

# pnpm 11 requires an explicit decision for every detected dependency build script.
# Only better-sqlite3 needs its native install step; keep every other script denied.
allowBuilds:
  better-sqlite3: true
  '@parcel/watcher': false
  esbuild: false
  msgpackr-extract: false
  msw: false
  sharp: false
  workerd: false

